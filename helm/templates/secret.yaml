apiVersion: v1
kind: Secret
metadata:
  name: {{ include "..fullname" . }}-secret
  labels:
    {{- include "..labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseURL | b64enc | quote }}
  # DATABASE_READ_URL falls back to DATABASE_URL when databaseReadURL is not set,
  # mirroring the config.go behaviour (single-instance Postgres by default).
  DATABASE_READ_URL: {{ (default .Values.secrets.databaseURL .Values.secrets.databaseReadURL) | b64enc | quote }}
